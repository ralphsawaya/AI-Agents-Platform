<style>
.trading-tab-header { margin-bottom:1.25rem; }
.trading-card { padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
.regime-badge { display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.8rem;font-weight:600; }
.regime-trending_up { background:#1a3a2a;color:#4ade80; }
.regime-trending_down { background:#3a1a1a;color:#f87171; }
.regime-ranging { background:#1a2a3a;color:#60a5fa; }
.regime-high_volatility { background:#3a2a1a;color:#fbbf24; }
.regime-breakout { background:#2a1a3a;color:#c084fc; }
.regime-accumulation { background:#1a3a3a;color:#2dd4bf; }
.kill-active { background:#ef4444 !important;color:white !important; }
.kill-inactive { background:#22c55e !important;color:white !important; }
.indicator-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px; }
.indicator-item { background:var(--surface-2);padding:8px;border-radius:6px; }
.indicator-item .label { font-size:0.75rem;color:#888; }
.indicator-item .val { font-size:0.95rem;font-weight:600; }
</style>

<div class="trading-tab-header">
    <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-outline" id="tab-kill-switch-btn" onclick="_ct_toggleKillSwitch()">Loading…</button>
        <button class="btn btn-primary" onclick="_ct_runAnalysis()">Run Analysis</button>
    </div>
</div>

<div class="stat-cards" id="trading-stats"></div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;">
    <div>
        <h3 class="mb-1">Current Regime</h3>
        <div class="trading-card" id="tab-regime-detail">
            <p class="text-dim">No regime data yet. Run an analysis to start.</p>
        </div>
    </div>
    <div>
        <h3 class="mb-1">Risk State</h3>
        <div class="trading-card" id="tab-risk-detail">
            <p class="text-dim">No risk data available.</p>
        </div>
    </div>
</div>

<script>
(function() {
    let _tradingEnabled = true;

    function fmtStrategy(s) {
        if (!s) return '—';
        return s.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }
    function fmtTime(t) {
        if (!t) return '—';
        return new Date(t).toLocaleString();
    }

    async function loadStatus() {
        const res = await API.get('/api/webhook/tradingview/status');
        if (!res.success) return;
        const d = res.data;
        _tradingEnabled = d.trading_enabled;

        const killBtn = document.getElementById('tab-kill-switch-btn');
        if (d.trading_enabled) {
            killBtn.textContent = 'Trading: ON';
            killBtn.className = 'btn kill-inactive';
        } else {
            killBtn.textContent = 'Trading: OFF';
            killBtn.className = 'btn kill-active';
        }

        document.getElementById('trading-stats').innerHTML = `
            <div class="stat-card">
                <div class="label">Market Regime</div>
                <div class="value regime-badge regime-${d.current_regime || ''}" style="font-size:1rem;">${d.current_regime || '—'}</div>
            </div>
            <div class="stat-card">
                <div class="label">Active Strategy</div>
                <div class="value" style="font-size:1rem;">${fmtStrategy(d.active_strategy)}</div>
            </div>
            <div class="stat-card">
                <div class="label">Today's Trades</div>
                <div class="value">${d.today_trades} / ${d.max_daily_trades}</div>
            </div>
            <div class="stat-card">
                <div class="label">Mode</div>
                <div class="value" style="font-size:1rem;color:${d.dry_run ? '#fbbf24' : '#ef4444'};">${d.dry_run ? 'DRY RUN' : 'LIVE'}</div>
            </div>
        `;
    }

    async function loadRegime() {
        const res = await API.get('/api/trading/regime');
        if (!res.success || !res.data) return;
        const d = res.data;
        const ind = d.indicators || {};

        document.getElementById('tab-regime-detail').innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="regime-badge regime-${d.regime}">${d.regime}</span>
                <span class="text-dim" style="font-size:0.85rem;">Confidence: ${(d.confidence * 100).toFixed(0)}%</span>
            </div>
            <p style="margin-top:10px;font-size:0.9rem;color:#ccc;">${d.reasoning || ''}</p>
            <div class="indicator-grid">
                <div class="indicator-item"><div class="label">ADX</div><div class="val">${ind.adx || '—'}</div></div>
                <div class="indicator-item"><div class="label">ATR</div><div class="val">${ind.atr || '—'}</div></div>
                <div class="indicator-item"><div class="label">RSI</div><div class="val">${ind.rsi || '—'}</div></div>
                <div class="indicator-item"><div class="label">BB Width</div><div class="val">${ind.bb_width || '—'}</div></div>
                <div class="indicator-item"><div class="label">EMA(9)</div><div class="val">${ind.ema_fast || '—'}</div></div>
                <div class="indicator-item"><div class="label">EMA(21)</div><div class="val">${ind.ema_mid || '—'}</div></div>
                <div class="indicator-item"><div class="label">EMA(50)</div><div class="val">${ind.ema_slow || '—'}</div></div>
                <div class="indicator-item"><div class="label">MACD Hist</div><div class="val">${ind.macd_hist || '—'}</div></div>
                <div class="indicator-item"><div class="label">Volume</div><div class="val">${ind.volume_ratio ? ind.volume_ratio + 'x' : '—'}</div></div>
                <div class="indicator-item"><div class="label">Price</div><div class="val">$${ind.current_price || '—'}</div></div>
            </div>
            <div class="text-dim" style="margin-top:8px;font-size:0.8rem;">Updated: ${fmtTime(d.timestamp)}</div>
        `;
    }

    async function loadRisk() {
        const res = await API.get('/api/trading/risk');
        if (!res.success || !res.data) return;
        const d = res.data;
        document.getElementById('tab-risk-detail').innerHTML = `
            <div class="indicator-grid">
                <div class="indicator-item"><div class="label">Portfolio</div><div class="val">$${(d.current_portfolio || 0).toFixed(2)}</div></div>
                <div class="indicator-item"><div class="label">Peak</div><div class="val">$${(d.peak_portfolio || 0).toFixed(2)}</div></div>
                <div class="indicator-item"><div class="label">Drawdown</div><div class="val">${((d.current_drawdown || 0) * 100).toFixed(1)}%</div></div>
            </div>
            <div class="text-dim" style="margin-top:8px;font-size:0.8rem;">Updated: ${fmtTime(d.updated_at)}</div>
        `;
    }

    window._ct_toggleKillSwitch = async function() {
        const newState = !_tradingEnabled;
        const res = await API.post('/api/trading/toggle', { enabled: newState });
        if (res.success) {
            toast(newState ? 'Trading ENABLED' : 'Trading DISABLED', newState ? 'success' : 'error');
            loadStatus();
        }
    };

    window._ct_runAnalysis = async function() {
        const res = await API.post('/api/trading/run-analysis');
        if (res.success) {
            toast('Analysis pipeline triggered', 'success');
            if (typeof loadRuns === 'function') loadRuns(1);
            if (typeof loadAgent === 'function') loadAgent();
        } else {
            toast('Failed: ' + (res.error || 'unknown'), 'error');
        }
    };

    function loadAll() { loadStatus(); loadRegime(); loadRisk(); }
    loadAll();
    window._ct_tradingInterval = setInterval(loadAll, 15000);
})();
</script>

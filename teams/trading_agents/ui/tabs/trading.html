<style>
/* ── Base ── */
.tt-section { margin-bottom:24px; }

/* ── Toolbar (just Run Analysis) ── */
.tt-toolbar { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
.btn-analysis { background:var(--primary);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:0.84rem;font-weight:600;cursor:pointer;transition:opacity 0.15s; }
.btn-analysis:hover { opacity:0.88; }

/* ── Stat cards row ── */
.tt-stats { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px; }
.tt-stat { padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px; }
.tt-stat .lbl { font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;color:#777;margin-bottom:6px; }
.tt-stat .val { font-size:1.1rem;font-weight:700; }

/* ── Cards (regime / risk) ── */
.tt-card { padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px; }
.tt-cards-row { display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px; }
.tt-card-title { font-size:0.88rem;font-weight:700;margin-bottom:12px; }

/* Regime badge */
.regime-badge { display:inline-block;padding:4px 14px;border-radius:12px;font-size:0.8rem;font-weight:600; }
.regime-trending_up    { background:#1a3a2a;color:#4ade80; }
.regime-trending_down  { background:#3a1a1a;color:#f87171; }
.regime-ranging        { background:#1a2a3a;color:#60a5fa; }
.regime-high_volatility{ background:#3a2a1a;color:#fbbf24; }
.regime-breakout       { background:#2a1a3a;color:#c084fc; }
.regime-accumulation   { background:#1a3a3a;color:#2dd4bf; }

/* Indicator grid */
.tt-ind-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:14px; }
.tt-ind { padding:8px 10px;background:var(--surface-2);border-radius:6px; }
.tt-ind .lbl { font-size:0.7rem;color:#777;margin-bottom:2px; }
.tt-ind .val { font-size:0.92rem;font-weight:600; }

/* ── Misc ── */
.text-dim { color:#777; }
.ts-small { font-size:0.78rem;color:#666;margin-top:10px; }
</style>

<!-- ============ Toolbar ============ -->
<div class="tt-toolbar">
    <button class="btn-analysis" onclick="_ct_runAnalysis()">Run Analysis</button>
</div>

<!-- ============ Stat Cards ============ -->
<div class="tt-stats" id="trading-stats">
    <div class="tt-stat"><div class="lbl">Market Regime</div><div class="val text-dim">—</div></div>
    <div class="tt-stat"><div class="lbl">Active Strategy</div><div class="val text-dim">—</div></div>
    <div class="tt-stat"><div class="lbl">Today's Trades</div><div class="val text-dim">—</div></div>
    <div class="tt-stat"><div class="lbl">Mode</div><div class="val text-dim">—</div></div>
</div>

<!-- ============ Regime + Risk ============ -->
<div class="tt-cards-row">
    <div class="tt-card">
        <div class="tt-card-title">Current Regime</div>
        <div id="tab-regime-detail">
            <p class="text-dim" style="font-size:0.88rem;">No regime data yet. Run an analysis to start.</p>
        </div>
    </div>
    <div class="tt-card">
        <div class="tt-card-title">Risk State</div>
        <div id="tab-risk-detail">
            <p class="text-dim" style="font-size:0.88rem;">No risk data available.</p>
        </div>
    </div>
</div>

<!-- Settings have moved to the Settings tab -->

<script>
(function() {
    function fmtStrategy(s) {
        if (!s) return '—';
        return s.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }
    function fmtTime(t) {
        if (!t) return '—';
        return new Date(t).toLocaleString();
    }

    // ── Dashboard loaders ──

    async function loadStatus() {
        const res = await API.get('/api/webhook/tradingview/status');
        if (!res.success) return;
        const d = res.data;

        document.getElementById('trading-stats').innerHTML = `
            <div class="tt-stat">
                <div class="lbl">Market Regime</div>
                <div class="val"><span class="regime-badge regime-${d.current_regime || ''}">${d.current_regime || '—'}</span></div>
            </div>
            <div class="tt-stat">
                <div class="lbl">Active Strategy</div>
                <div class="val">${fmtStrategy(d.active_strategy)}</div>
            </div>
            <div class="tt-stat">
                <div class="lbl">Today's Trades</div>
                <div class="val">${d.today_trades} / ${d.max_daily_trades}</div>
            </div>
            <div class="tt-stat">
                <div class="lbl">Mode</div>
                <div class="val" style="color:${d.dry_run ? '#fbbf24' : '#ef4444'};">${d.dry_run ? 'DRY RUN' : 'LIVE'}</div>
            </div>
        `;
    }

    async function loadRegime() {
        const res = await API.get('/api/trading/regime');
        if (!res.success || !res.data) return;
        const d = res.data;
        const ind = d.indicators || {};

        document.getElementById('tab-regime-detail').innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="regime-badge regime-${d.regime}">${d.regime}</span>
                <span class="text-dim" style="font-size:0.82rem;">Confidence: ${(d.confidence * 100).toFixed(0)}%</span>
            </div>
            <p style="margin-top:10px;font-size:0.86rem;color:#bbb;line-height:1.5;">${d.reasoning || ''}</p>
            <div class="tt-ind-grid">
                <div class="tt-ind"><div class="lbl">ADX</div><div class="val">${ind.adx ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">ATR</div><div class="val">${ind.atr ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">RSI</div><div class="val">${ind.rsi ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">BB Width</div><div class="val">${ind.bb_width ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">EMA(9)</div><div class="val">${ind.ema_fast ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">EMA(21)</div><div class="val">${ind.ema_mid ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">EMA(50)</div><div class="val">${ind.ema_slow ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">MACD Hist</div><div class="val">${ind.macd_hist ?? '—'}</div></div>
                <div class="tt-ind"><div class="lbl">Volume</div><div class="val">${ind.volume_ratio ? ind.volume_ratio + 'x' : '—'}</div></div>
                <div class="tt-ind"><div class="lbl">Price</div><div class="val">$${ind.current_price ?? '—'}</div></div>
            </div>
            <div class="ts-small">Updated: ${fmtTime(d.timestamp)}</div>
        `;
    }

    async function loadRisk() {
        const res = await API.get('/api/trading/risk');
        if (!res.success || !res.data) return;
        const d = res.data;
        document.getElementById('tab-risk-detail').innerHTML = `
            <div class="tt-ind-grid">
                <div class="tt-ind"><div class="lbl">Portfolio</div><div class="val">$${(d.current_portfolio || 0).toFixed(2)}</div></div>
                <div class="tt-ind"><div class="lbl">Peak</div><div class="val">$${(d.peak_portfolio || 0).toFixed(2)}</div></div>
                <div class="tt-ind"><div class="lbl">Drawdown</div><div class="val">${((d.current_drawdown || 0) * 100).toFixed(1)}%</div></div>
            </div>
            <div class="ts-small">Updated: ${fmtTime(d.updated_at)}</div>
        `;
    }

    window._ct_runAnalysis = async function() {
        const res = await API.post('/api/trading/run-analysis', { agent_id: typeof AGENT_ID !== 'undefined' ? AGENT_ID : undefined });
        if (res.success) {
            toast('Analysis pipeline triggered', 'success');
            if (typeof loadRuns === 'function') loadRuns(1);
            if (typeof loadAgent === 'function') loadAgent();
        } else {
            toast('Failed: ' + (res.error || 'unknown'), 'error');
        }
    };

    function loadAll() { loadStatus(); loadRegime(); loadRisk(); }
    loadAll();
    window._ct_tradingInterval = setInterval(loadAll, 15000);
})();
</script>

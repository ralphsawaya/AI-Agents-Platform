<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Agent Platform{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ static_url('css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-logo"><span class="logo-icon">AP</span>Agent Platform</div>
        <div class="sidebar-nav">
            <a href="/"><span class="nav-icon">&#9635;</span> Dashboard</a>
            <a href="/monitor"><span class="nav-icon">&#9673;</span> Monitor</a>
            <a href="/scheduler"><span class="nav-icon">&#9201;</span> Scheduler</a>
            <a href="/graph"><span class="nav-icon">&#9670;</span> Graph</a>
        </div>
    </nav>
    <main class="main">
        <div id="alert-area"></div>
        {% block content %}{% endblock %}
    </main>
    <script src="{{ static_url('js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
